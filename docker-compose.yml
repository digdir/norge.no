services:
  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    ports:
      - "8085:8787"
    env_file:
      - ./apps/frontend/.dev.vars
    environment:
      ASSISTANT_API_URL: http://localhost:8000/api
    develop:
      watch:
        - action: rebuild
          path: ./apps/frontend/.dev.vars
          target: /app/apps/frontend/.dev.vars

  assistant:
    restart: unless-stopped
    build:
      context: ./apps/assistant
      secrets:
        - assistant_env
    ports:
      - "8000:8000"
    env_file:
      - ./apps/assistant/.env

  cloudflared:
    image: docker.io/cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - assistant

secrets:
  assistant_env:
    # Points to the file containing your env vars
    file: ./apps/assistant/.env
