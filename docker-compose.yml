services:
  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    ports:
      - "8085:8787"
    env_file:
      - ./apps/frontend/.dev.vars
    environment:
      ASSISTANT_API_URL: http://localhost:8000/api
    develop:
      watch:
        - action: rebuild
          path: ./apps/frontend/.dev.vars
          target: /app/apps/frontend/.dev.vars

  assistant-app:
    restart: unless-stopped
    build:
      context: ./apps/assistant
      secrets:
        - assistant_env
    expose:
      - "8000"
    env_file:
      - ./apps/assistant/.env
    container_name: assistant-app

  caddy:
    image: docker.io/library/caddy:latest
    container_name: caddy-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:Z
      - caddy_data:/data:Z
      - caddy_config:/config:Z
    depends_on:
      - assistant-app

secrets:
  assistant_env:
    # Points to the file containing your env vars
    file: ./apps/assistant/.env

volumes:
  caddy_data:
  caddy_config: