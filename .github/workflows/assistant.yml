name: Deploy Assistant to ACA

on:
  push:
    branches:
      - main
    paths:
      - "apps/assistant/**"
      - ".github/workflows/assistant.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.REGISTRY_LOGIN_SERVER }}/assistant:${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # Pinned to v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Log in to Azure Container Registry
        # pinned to 2.0
        uses: azure/docker-login@15c4aadf093404726ab2ff205b2cdd33fa6d054c
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          # The context points to the assistant app directory. 
          cd apps/assistant
          docker build -t ${{ env.IMAGE_NAME }} .
          docker push ${{ env.IMAGE_NAME }}

      - name: Deploy to Azure Container Apps
        # Pinned to v2
        uses: azure/container-apps-deploy-action@8dff69dac3367c32ceb2690d8f13adbeab462703
        with:
          imageToDeploy: ${{ env.IMAGE_NAME }}
          resourceGroup: assistant-test-rg
          containerAppName: assistant
          targetPort: 8000
          ingress: external
          registryUrl: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          registryUsername: ${{ secrets.REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.REGISTRY_PASSWORD }}
